<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Enterprise App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Git Enterprise App</h1>
    <nav>
      <a href="#">Dashboard</a>
      <a href="#">Repositories</a>
      <a href="#">Teams</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Welcome back</h2>
      <p>Manage your repositories and teams from one place.</p>
      <button id="get-started">Get Started</button>
    </section>

    <section class="cards">
      <div class="card">
        <h3>Repositories</h3>
        <p class="count">24</p>
        <p>Active repos</p>
      </div>
      <div class="card">
        <h3>Teams</h3>
        <p class="count">6</p>
        <p>Active teams</p>
      </div>
      <div class="card">
        <h3>Members</h3>
        <p class="count">142</p>
        <p>Total members</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <p>hello it's claude</p>
</body>
</html>
